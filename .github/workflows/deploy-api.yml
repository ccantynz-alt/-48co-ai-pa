name: Deploy API Server

# Blue-green deployment: staging first, then production
# Staging auto-deploys on every push. Production requires manual approval.

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

jobs:
  # ── STAGING (auto-deploy) ─────────────────────────────
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        working-directory: api
        run: docker build -t 48co-api:staging .

      - name: Test API starts
        working-directory: api
        run: |
          # Verify the server starts without crashing
          timeout 10 node -e "
            process.env.CLAUDE_API_KEY = 'test-key';
            process.env.OPENAI_API_KEY = 'test-key';
            const http = require('http');
            // Override listen to test startup
            const origListen = http.Server.prototype.listen;
            http.Server.prototype.listen = function(port, cb) {
              console.log('Server would start on port', port);
              process.exit(0);
            };
            require('./server.js');
          " || true

      - name: Deploy to staging
        run: |
          echo "Deploy to staging environment"
          echo "URL: https://staging-api.48co.nz"
          # Add actual deployment command here:
          # fly deploy --app 48co-api-staging
          # or: railway deploy --environment staging
          # or: kubectl apply -f k8s/staging/

  # ── PRODUCTION (manual approval required) ─────────────
  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        working-directory: api
        run: docker build -t 48co-api:production .

      - name: Deploy to production
        run: |
          echo "Deploy to production environment"
          echo "URL: https://api.48co.nz"
          # Add actual deployment command here:
          # fly deploy --app 48co-api
          # or: railway deploy --environment production
          # or: kubectl apply -f k8s/production/
