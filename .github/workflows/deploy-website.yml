name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'components/**'
      - 'public/**'
      - 'package.json'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Next.js
        run: npm run build

      - name: Deploy to Vercel
        run: |
          echo "Deploy to Vercel / Netlify / Cloudflare Pages"
          echo "URL: https://48co.nz"
          # Add actual deployment:
          # npx vercel --prod --token $VERCEL_TOKEN
          # or: netlify deploy --prod
