name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint & Build (Website)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  rust-check:
    name: Rust Check (Desktop & Shared)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            tauri-app/src-tauri
            shared-rust

      - name: Check shared-rust
        working-directory: shared-rust
        run: cargo check --all-targets

      - name: Check tauri-app
        working-directory: tauri-app/src-tauri
        run: cargo check --all-targets

      - name: Clippy (shared-rust)
        working-directory: shared-rust
        run: cargo clippy -- -D warnings

      - name: Clippy (tauri-app)
        working-directory: tauri-app/src-tauri
        run: cargo clippy -- -D warnings
