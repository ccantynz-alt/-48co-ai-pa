<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>48co Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: transparent;
      overflow: hidden;
      font-family: 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace;
      -webkit-app-region: no-drag;
      user-select: none;
    }

    .overlay {
      width: 300px;
      margin: 10px;
      padding: 14px 18px;
      background: rgba(10, 10, 14, 0.92);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      color: white;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: all 0.3s ease;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: rgba(255, 255, 255, 0.6);
    }

    .status-badge {
      font-size: 9px;
      padding: 2px 8px;
      border-radius: 4px;
      letter-spacing: 0.05em;
      transition: all 0.3s;
    }

    .status-badge.recording {
      background: rgba(255, 59, 92, 0.15);
      border: 1px solid rgba(255, 59, 92, 0.4);
      color: #ff3b5c;
    }
    .status-badge.processing {
      background: rgba(255, 184, 0, 0.15);
      border: 1px solid rgba(255, 184, 0, 0.4);
      color: #ffb800;
    }
    .status-badge.typing {
      background: rgba(0, 240, 255, 0.15);
      border: 1px solid rgba(0, 240, 255, 0.4);
      color: #00f0ff;
    }
    .status-badge.done {
      background: rgba(0, 255, 136, 0.15);
      border: 1px solid rgba(0, 255, 136, 0.4);
      color: #00ff88;
    }
    .status-badge.error {
      background: rgba(255, 59, 92, 0.15);
      border: 1px solid rgba(255, 59, 92, 0.4);
      color: #ff3b5c;
    }

    /* Waveform */
    .waveform {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      height: 28px;
    }

    .bar {
      width: 3px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.1);
      transition: all 0.3s ease;
      height: 4px;
    }

    .bar.active {
      background: #00f0ff;
      animation: barPulse var(--speed, 0.8s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
    }

    @keyframes barPulse {
      0%, 100% { height: var(--min, 4px); }
      50% { height: var(--max, 24px); }
    }

    .transcript {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.35);
      line-height: 1.4;
      max-height: 32px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .transcript:empty { display: none; }

    /* Pulse border animation for recording */
    .overlay.recording {
      border-color: rgba(255, 59, 92, 0.3);
      box-shadow: 0 0 20px rgba(255, 59, 92, 0.1);
    }
    .overlay.done {
      border-color: rgba(0, 255, 136, 0.3);
    }
    .overlay.error {
      border-color: rgba(255, 59, 92, 0.3);
    }
  </style>
</head>
<body>
  <div class="overlay" id="overlay">
    <div class="header">
      <span class="brand">48CO</span>
      <span class="status-badge recording" id="status-badge">LISTENING</span>
    </div>
    <div class="waveform" id="waveform"></div>
    <div class="transcript" id="transcript"></div>
  </div>

  <script>
    const overlay = document.getElementById('overlay')
    const statusBadge = document.getElementById('status-badge')
    const waveformEl = document.getElementById('waveform')
    const transcriptEl = document.getElementById('transcript')

    // Build waveform bars
    const barConfigs = [
      { speed: '0.7s', delay: '0s', min: 4, max: 18 },
      { speed: '0.9s', delay: '0.1s', min: 6, max: 24 },
      { speed: '0.6s', delay: '0.2s', min: 3, max: 20 },
      { speed: '1.0s', delay: '0.05s', min: 8, max: 28 },
      { speed: '0.75s', delay: '0.15s', min: 5, max: 16 },
    ]

    for (let i = 0; i < 16; i++) {
      const cfg = barConfigs[i % 5]
      const bar = document.createElement('div')
      bar.className = 'bar'
      bar.style.setProperty('--speed', cfg.speed)
      bar.style.setProperty('--delay', cfg.delay)
      bar.style.setProperty('--min', cfg.min + 'px')
      bar.style.setProperty('--max', cfg.max + 'px')
      bar.style.height = (3 + (i % 5) * 2) + 'px'
      waveformEl.appendChild(bar)
    }

    const bars = document.querySelectorAll('.bar')

    const STATUS_MAP = {
      idle:       { label: 'READY',        class: 'recording' },
      recording:  { label: 'LISTENING',    class: 'recording' },
      processing: { label: 'TRANSCRIBING', class: 'processing' },
      typing:     { label: 'TYPING',       class: 'typing' },
      done:       { label: 'DONE',         class: 'done' },
      error:      { label: 'ERROR',        class: 'error' },
    }

    // ─── Audio Recording (in renderer for mic access) ──────────
    let mediaRecorder = null
    let audioChunks = []

    async function startAudioCapture(config) {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            channelCount: 1,
            sampleRate: 16000,
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true,
          },
        })

        audioChunks = []
        mediaRecorder = new MediaRecorder(stream, {
          mimeType: 'audio/webm;codecs=opus',
        })

        mediaRecorder.ondataavailable = (e) => {
          if (e.data.size > 0) audioChunks.push(e.data)
        }

        mediaRecorder.onstop = async () => {
          // Stop all tracks
          stream.getTracks().forEach(t => t.stop())

          if (audioChunks.length === 0) {
            window.foureightco.sendTranscription('')
            return
          }

          const audioBlob = new Blob(audioChunks, { type: 'audio/webm' })

          if (config.engine === 'whisper' && config.whisperApiKey) {
            await transcribeWithWhisper(audioBlob, config)
          } else {
            // Web Speech API fallback handled differently (see below)
            window.foureightco.sendError('No Whisper API key configured. Please add your key in Settings.')
          }
        }

        mediaRecorder.start(250) // collect chunks every 250ms
      } catch (err) {
        window.foureightco.sendError('Microphone access denied: ' + err.message)
      }
    }

    function stopAudioCapture() {
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop()
      }
    }

    async function transcribeWithWhisper(audioBlob, config) {
      try {
        const formData = new FormData()
        formData.append('file', audioBlob, 'recording.webm')
        formData.append('model', 'whisper-1')
        formData.append('language', config.language || 'en')

        const response = await fetch('https://api.openai.com/v1/audio/transcriptions', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + config.whisperApiKey,
          },
          body: formData,
        })

        if (!response.ok) {
          const errText = await response.text()
          throw new Error('Whisper API error (' + response.status + '): ' + errText)
        }

        const data = await response.json()
        window.foureightco.sendTranscription(data.text || '')
      } catch (err) {
        window.foureightco.sendError(err.message)
      }
    }

    // ─── IPC Listeners ─────────────────────────────────────────
    window.foureightco.onStartRecording((config) => {
      startAudioCapture(config)
    })

    window.foureightco.onStopRecording(() => {
      stopAudioCapture()
    })

    window.foureightco.onRecordingState((data) => {
      const cfg = STATUS_MAP[data.status] || STATUS_MAP.idle
      statusBadge.textContent = cfg.label
      statusBadge.className = 'status-badge ' + cfg.class
      overlay.className = 'overlay ' + cfg.class

      // Animate waveform bars
      bars.forEach(bar => {
        if (data.status === 'recording') {
          bar.classList.add('active')
        } else {
          bar.classList.remove('active')
        }
      })

      // Show transcript text
      if (data.text) {
        transcriptEl.textContent = data.text
      }

      if (data.message) {
        transcriptEl.textContent = data.message
      }
    })
  </script>
</body>
</html>
